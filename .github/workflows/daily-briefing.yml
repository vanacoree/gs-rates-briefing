name: Daily Rates Briefing Update

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Update briefing
        run: python update_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated briefing
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: daily rates briefing update"
          file_pattern: morning-rates-briefing.html
